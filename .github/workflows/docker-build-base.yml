name: Build and Push Base Image

# Manual trigger only - base image rarely changes
on:
  workflow_dispatch:
    inputs:
      flash_attn_version:
        description: 'Flash Attention version tag (e.g., flash-attn-v2.8.3)'
        required: true
        default: 'flash-attn-v2.8.3'

env:
  REGISTRY: docker.io
  IMAGE_NAME: veylansolmira/caml-base

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download flash-attn from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.event.inputs.flash_attn_version }} \
            --pattern "flash-attn-*.tar.gz" \
            --dir ./strongcompute/docker/
          ls -lh ./strongcompute/docker/flash-attn-*.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.flash_attn_version }}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./strongcompute/docker
          file: ./strongcompute/docker/Dockerfile.base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
